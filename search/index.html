<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search PHARPRO</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://pharpro.co/search/" />
  <!-- Open Graph -->
  <meta property="og:type"         content="website" />
  <meta property="og:url"          content="https://pharpro.co/search/" />
  <meta property="og:title"        content="Search PHARPRO" />
  <meta property="og:description"  content="Search PHARPRO pharmaceutical compliance resources, insights, and consulting services." />
  <meta property="og:image"        content="https://pharpro.co/images/og-home.png" />
  <meta property="og:image:type"   content="image/png" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name"    content="PHARPRO Consultation Company" />
  <meta property="og:locale"       content="en_US" />
  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Search PHARPRO" />
  <meta name="twitter:description" content="Search PHARPRO pharmaceutical compliance resources, insights, and consulting services." />
  <meta name="twitter:image"       content="https://pharpro.co/images/og-home.png" />
  <meta name="twitter:site"        content="@pharprocc" />
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var q = params.get('q') || params.get('query') || '';
      if (q) {
        window.location.replace(
          'https://www.google.com/search?q=' +
          encodeURIComponent('site:pharpro.co ' + q)
        );
      } else {
        window.location.replace('https://pharpro.co/');
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://pharpro.co/" />
  </noscript>
</head>

</html>
