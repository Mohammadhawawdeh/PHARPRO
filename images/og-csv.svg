<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#233A5E"/>
      <stop offset="100%" stop-color="#233A5Edd"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B12C4B"/>
      <stop offset="100%" stop-color="#B12C4B99"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#B12C4B"/>
  <!-- Top accent stripe -->
  <rect x="8" y="0" width="1192" height="4" fill="url(#ac)" opacity="0.6"/>
  <!-- Grid pattern overlay -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M60 0 L0 0 0 60" fill="none" stroke="white" stroke-width="0.3" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Bottom accent line -->
  <rect x="8" y="598" width="300" height="4" fill="#B12C4B" rx="2"/>
  <!-- PHARPRO Logo text -->
  <text x="80" y="90" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="900" fill="white" letter-spacing="-1" opacity="0.9">PHARPRO</text>
  <text x="80" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="white" opacity="0.5" letter-spacing="3">PHARMACEUTICAL CONSULTING</text>
  <!-- Divider -->
  <rect x="80" y="140" width="60" height="3" fill="#B12C4B" rx="2"/>
  <!-- Category label -->
  <text x="80" y="220" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#B12C4B" letter-spacing="2" text-transform="uppercase">CSV VALIDATION</text>
  <!-- Main subtitle -->
  <text x="80" y="290" font-family="Arial Black, Arial, sans-serif" font-size="48" font-weight="900" fill="white" letter-spacing="-1">Computerized System Validation</text>
  
  <!-- Domain -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="white" opacity="0.6">pharpro.co</text>
  <!-- Decorative circle -->
  <circle cx="1050" cy="315" r="200" fill="#B12C4B" opacity="0.08"/>
  <circle cx="1050" cy="315" r="150" fill="#B12C4B" opacity="0.06"/>
  <circle cx="1050" cy="315" r="100" fill="#B12C4B" opacity="0.10"/>
  <!-- Jordan / MENA label -->
  <text x="80" y="590" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.4">Amman, Jordan · Serving regulated pharma worldwide · Founded 2014</text>
</svg>